name: Build and Push Communication Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u A95H --password-stdin

      - name: Build API Docker image
        run: |
          docker build \
            --build-arg NUGET_AUTH_TOKEN=${{ secrets.NUGET_AUTH_TOKEN }} \
            -f src/ZawatSys.MicroService.Communication.Api/Dockerfile \
            -t ghcr.io/a95h/zawatsys-communication-service:1.0.0 \
            .

      - name: Push API Docker image
        run: |
          docker push ghcr.io/a95h/zawatsys-communication-service:1.0.0
